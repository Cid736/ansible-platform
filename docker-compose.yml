version: "3.9"

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-ansible_platform}
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    # SECURITY: Do NOT expose port 5432 to the host — DB is internal only.
    # ports:
    #   - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    # SECURITY: Do NOT expose port 6379 to the host — Redis is internal only.
    # ports:
    #   - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      # SECURITY: Do NOT bind-mount ./backend into the container in production.
      # A compromised host directory or misconfigured file permission could let an
      # attacker overwrite application code inside the running container.
      # Remove the line below for production; use the image as-built instead.
      # - ./backend:/app
      - ./data/ansible/projects:/ansible/projects
      - ./data/ansible/artifacts:/ansible/artifacts
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port 8000"

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    volumes:
      # SECURITY: same as backend — remove the source bind-mount in production.
      # - ./backend:/app
      - ./data/ansible/projects:/ansible/projects
      - ./data/ansible/artifacts:/ansible/artifacts
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "celery -A app.worker worker --loglevel=info --concurrency=4"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
